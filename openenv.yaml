name: code-review-env
version: "1.0.0"
description: "An OpenEnv environment for training AI agents to review code diffs"
author: "B2prakash"
license: "MIT"
endpoint: "https://b2prakash-code-review-env.hf.space"

tasks:
  - id: task_1
    name: Bug Identification
    difficulty: easy
    max_turns: 5

  - id: task_2
    name: Security Audit
    difficulty: medium
    max_turns: 5

  - id: task_3
    name: Refactor Quality Review
    difficulty: hard
    max_turns: 8

observation_space:
  type: object

action_space:
  type: object

reward_range: [0.0, 1.0]